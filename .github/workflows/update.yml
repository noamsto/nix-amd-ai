name: Check for upstream updates

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v17
        with:
          name: nix-amd-ai
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Check for new releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/check-updates.sh

      - name: Update nixpkgs lock
        if: steps.check.outputs.nixpkgs_needs_update == 'true'
        run: nix flake update nixpkgs

      - name: Bump versions
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/bump-versions.sh \
            "${{ steps.check.outputs.flm_latest }}" "${{ steps.check.outputs.flm_current }}" \
            "${{ steps.check.outputs.lem_latest }}" "${{ steps.check.outputs.lem_current }}" \
            "${{ steps.check.outputs.xdna_latest }}" "${{ steps.check.outputs.xdna_current }}"

      - name: Validate flake eval
        if: steps.check.outputs.needs_update == 'true'
        id: flake_check
        continue-on-error: true
        run: |
          if nix flake check --no-build 2>&1 | tee /tmp/flake-check.log; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
            {
              echo "log<<CHECK_EOF"
              tail -40 /tmp/flake-check.log
              echo "CHECK_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build updated packages
        if: steps.check.outputs.needs_update == 'true'
        id: build
        run: |
          FAILED=""
          for pkg in xrt xrt-plugin-amdxdna fastflowlm lemonade; do
            if ! nix build ".#$pkg"; then
              FAILED+="- ${pkg}"$'\n'
            fi
          done
          {
            echo "failed<<BUILD_EOF"
            printf '%s' "$FAILED"
            echo "BUILD_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          FLAKE_CHECK_LOG: ${{ steps.flake_check.outputs.log }}
          BUILD_FAILED: ${{ steps.build.outputs.failed }}
        run: |
          git diff --quiet && echo "No changes" && exit 0

          BRANCH="update/$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: bump upstream package versions"
          git push origin "$BRANCH"

          BODY="## Upstream updates detected"$'\n\n'
          [ "${{ steps.check.outputs.flm_latest }}" != "${{ steps.check.outputs.flm_current }}" ] && \
            BODY+="- FastFlowLM: ${{ steps.check.outputs.flm_current }} -> ${{ steps.check.outputs.flm_latest }}"$'\n'
          [ "${{ steps.check.outputs.lem_latest }}" != "${{ steps.check.outputs.lem_current }}" ] && \
            BODY+="- Lemonade: ${{ steps.check.outputs.lem_current }} -> ${{ steps.check.outputs.lem_latest }}"$'\n'
          [ "${{ steps.check.outputs.xdna_latest }}" != "${{ steps.check.outputs.xdna_current }}" ] && \
            BODY+="- xdna-driver: ${{ steps.check.outputs.xdna_current }} -> ${{ steps.check.outputs.xdna_latest }}"$'\n'

          NIXPKGS_DIFFS='${{ steps.check.outputs.nixpkgs_backend_diffs }}'
          if [ -n "$NIXPKGS_DIFFS" ]; then
            BODY+=$'\n'"### nixpkgs backend versions"$'\n'
            BODY+="$NIXPKGS_DIFFS"
          fi

          if [ "${{ steps.check.outputs.mtp_cleanup }}" = "true" ]; then
            BODY+=$'\n'"**TODO:** drop \`llamaCppMtpOverride\` from \`flake.nix\` — nixpkgs llama-cpp has caught up past b9175."$'\n'
          fi

          if [ "${{ steps.flake_check.outputs.status }}" = "fail" ]; then
            BODY+=$'\n'"### ⚠️ \`nix flake check\` failed"$'\n'
            BODY+=$'\n''```'$'\n'"$FLAKE_CHECK_LOG"$'\n''```'$'\n'
          fi

          if [ -n "$BUILD_FAILED" ]; then
            BODY+=$'\n'"### ⚠️ Build failures"$'\n'"$BUILD_FAILED"
          fi

          BODY+=$'\n'"**Note:** Hashes may need manual correction if auto-prefetch failed."

          echo "$BODY" | gh pr create --title "chore: bump upstream package versions" --body-file -
