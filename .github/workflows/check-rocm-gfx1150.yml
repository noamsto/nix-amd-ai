name: Check ROCm gfx1150 native support

on:
  schedule:
    # Weekly, Mondays at 06:00 UTC — matches the existing update.yml cadence.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe ROCm for gfx1150
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/check-rocm-gfx1150.sh | tee probe.out

      - name: Open tracking issue when signal found
        if: steps.probe.outputs.signal == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip if an open tracking issue already exists; this lets the
          # workflow re-run every month without spamming duplicates.
          existing=$(gh issue list \
            --state open \
            --search 'in:title "ROCm gfx1150 native support detected"' \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Issue #$existing already tracks this; nothing to do."
            exit 0
          fi

          {
            echo "The monthly ROCm gfx1150 probe found a signal."
            echo
            echo "### Raw probe output"
            echo
            echo '```'
            cat probe.out
            echo '```'
            echo
            echo "### Next steps"
            echo
            echo "- Confirm the referenced ROCm release actually ships gfx1150 kernels (not just a mention in a roadmap bullet)."
            echo "- Bump \`rocmPackages\` via the nixpkgs flake input and rebuild \`llama-cpp-rocm\`."
            echo "- Drop \`rocmGfxOverride = \"11.0.2\"\` from consumer hosts and re-run \`nix run .#benchmark -- --backend rocm ...\`."
            echo "- Update the \"Which backend should I use?\" table in the README with the new numbers."
          } > body.md

          gh issue create \
            --title "ROCm gfx1150 native support detected — re-benchmark and drop gfx1102 override" \
            --body-file body.md \
            --label 'rocm,tracking'
