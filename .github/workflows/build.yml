name: Build and cache

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v17
        with:
          name: nix-amd-ai
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build all packages
        run: nix build .#xrt .#xrt-plugin-amdxdna .#fastflowlm .#lemonade
      - name: Check flake
        run: nix flake check
      - name: Verify lemond unit (systemd-analyze)
        run: |
          unit=$(nix build .#lemond-unit --print-out-paths)/lemond.service

          # Self-check: prove the verifier actually flags a bad unit, so a clean
          # pass below can't mask a missing/dead systemd-analyze on the runner.
          printf '[Unit]\nDescription=ctl\n[Service]\nExecStart=/bin/true\nRuntimeDirectory=/absolute/bad\n' > ctl.service
          systemd-analyze verify ctl.service 2>&1 | grep -qi 'RuntimeDirectory' \
            || { echo "systemd-analyze did not flag a known-bad unit; aborting"; exit 1; }

          # A valid unit yields no diagnostic mentioning our directives, so any
          # mention of them is a real problem. (ExecStart points at an unbuilt
          # store path, which verify reports separately — ignored via || true.)
          report=$(systemd-analyze verify "$unit" 2>&1 || true)
          echo "$report"
          if echo "$report" | grep -Ei 'RuntimeDirectory|NIX_LD'; then
            echo "systemd-analyze flagged lemond's directives"; exit 1
          fi

  build-darwin:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v17
        with:
          name: nix-amd-ai
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build Lemonade (Metal)
        run: nix build .#lemonade .#benchmark
      - name: Check flake
        run: nix flake check

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          # Only release when the package set changed — skip CI/docs-only pushes.
          changed=$(git diff --name-only "$BEFORE" "$SHA" 2>/dev/null || git show --name-only --format= "$SHA")
          if ! echo "$changed" | grep -qE '^(flake\.(lock|nix)|pkgs/)'; then
            echo "No package changes in this push; skipping release."
            exit 0
          fi

          # First free vYYYY.MM.DD[-N] tag, so same-day re-cuts suffix instead of
          # silently skipping (the old behaviour stranded later merges).
          base="v$(date -u +%Y.%m.%d)"
          tag="$base"
          n=1
          while git rev-parse "$tag" >/dev/null 2>&1; do
            n=$((n + 1))
            tag="${base}-${n}"
          done

          prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$prev_tag" ]; then
            notes=$(git log --pretty='* %s (%h)' "${prev_tag}..HEAD")
          else
            notes="First tagged release."
          fi

          lem=$(sed -n 's/.*"\(.*\)".*/\1/p' pkgs/lemonade/version.nix | head -1)
          if [ -n "$lem" ]; then
            title="$tag — Lemonade $lem"
          else
            title="$tag"
          fi

          git tag "$tag" "$SHA"
          git push origin "$tag"
          printf '%s\n' "$notes" | gh release create "$tag" --title "$title" --notes-file -
